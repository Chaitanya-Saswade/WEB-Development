<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label>Name</label>
    <input placeholder="Enter your Name"> <br><br>

    <label>Email</label>
    <input placeholder="Enter Email" type="Email"> <br><br>

    <label>Password</label>
    <input placeholder="Enter Password" type="password"> <br><br>

    <label>Age/Phone</label>
    <input placeholder="Enter Age/Phone" type="number"></body> <br><br>

<label>Pdf/Resume</label>
<input placeholder="File" type="file"> <br><br>

<label>D.O.B</label>
<input placeholder="BirtDate" type="date"> <br><br>

<label>Terms&Conditions</label>
<input type="checkbox"> <br><br>

<label>Address</label>
<textarea placeholder="Address" cols=" 20 " rows="5 "></textarea> <br><br>

</body>

</html>

<!-- Label Tag Tells what input is required -->
<!-- Input Tag is used to take input from user -->
<!-- Type Attribute is so that user can only input the required data and no other unwanted information -->
<!-- Textarea Tag is used For Multiple Lines of Input -->
