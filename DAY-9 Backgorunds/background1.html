<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: cursive;
            margin: 0;
        }
        
        .banner {
            height: 800px;
            border: 1x solid black;
            text-align: center;
            font-size: 30px;
            color: aliceblue;
            text-shadow: 0px 6px 10px rgb(0, 0, 0);
            /* .. */
            background-color: bisque;
            background-image: url(https://cdn-s3.autocarindia.com/Maruti-Suzuki/Brezza/_DSC1938.JPG);
            background-position: center;
            background-size: cover;
            /* .. */
            /* filter: blur(50px); */
            filter: brightness(90%);
            filter: contrast(90%);
        }
    </style>
</head>

<body>
    <div class="banner">
        <h1>BREZZA🖤</h1>
    </div>
</body>

</html>
