    <style>
        /* Grouping 
        Grouping ID,Class and tags for same style
        */
        
        #xyz,
        .abc,
        div {
            color: rgb(225, 255, 0);
            font-family: cursive;
        }
        
        body {
            background-color: rgb(255, 120, 120);
        }
    </style>
</head>

<body>
    <h1 class="abc">CLASS SELECTOR</h1>

    <div class="abc">Class Selector is Used to Aply Same Style For Multple Tags</div>

    <p class="abc">Tags are added in a Class</p>

    <p>Class has the Style Information</p>

    <p id="xyz">CSS is Cascading Style Sheet</p>

    <p id="xyz">HTML is Hypertext Markup Language</p>
