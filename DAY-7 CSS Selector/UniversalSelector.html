<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /*
        Tag is '*'
         Rule - UseSymbol '*'
        No need add any name use only '*'
     */
        
        * {
            color: rgb(255, 255, 255);
            background-color: rgb(98, 0, 255);
        }
    </style>
</head>

<body>
    <h1 class="abc">UNIVERSAL SELECTOR</h1>
    <div class="abc">UNIVERSAL Selector is Used to Aply Same Style For Multple Tags</div>
    <p class="abc">Anything We write on the Page will Under the Universal Selector </p>
    <p>i.e Will have the same style as other TEXT</p>
</body>

</html>

</html>
