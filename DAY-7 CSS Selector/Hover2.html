<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
        #h1 {
            background-color: rgb(255, 139, 139);
            height: 100px;
            width: 130px;
        }
        
        #h2 {
            background-color: rgb(172, 112, 255);
            height: 100px;
            width: 130px;
        }
        /* --------------------HOVERING-----------------------*/
        /*
         #h1:hover {
            transform: rotate(360deg);
            transition: 1.0s;
            
        */
        
        #h1:hover {
            transform: rotateY(360deg);
            transition: 1.3s;
        }
        
        #h2:hover {
            transform: scaleX(1.2);
            transition: 1s;
        }
        /* #h2:hover {
            transform: translateX(110px);
            transition: 1s;
        } */
    </style>
</head>

<body>

    <div id="h1">
        <h2>Hovering</h2>
    </div><br><br>

    <div id="h2">
        <h2>Hovering2</h2>
    </div>
</body>

</html>
