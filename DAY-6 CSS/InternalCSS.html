<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* TagName {
            Property Name of CSS
        }
        
        */
        
        button {
            color: aquamarine;
            background-color: black;
        }
        
        p {
            color: rgb(250, 242, 1);
            background-color: rgb(0, 0, 0);
            text-align: center;
            font-family: 'Trebuchet MS';
        }
        
        span {
            color: rgb(255, 255, 255);
        }
    </style>
</head>

<body>
    <!-- Internal CSS -Inside the html File by using special Tag -STYLE TAG IN HEAD SECTION -->
    <button>Log In</button>

    <p>Today's Match <span>CSK</span> vs <span>MI</span></p>
</body>

</html>
