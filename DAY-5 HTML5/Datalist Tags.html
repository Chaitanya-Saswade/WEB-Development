<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Datalist Tags -Shows the Listof the Data related to the Input -->

    <label>Enter your Country: </label>
    <input list="country">

    <datalist id="country">
        <option value="India">
        <option value ="Italy">
        <option value="Iran">
        <option value="Russia">
        <option value="Kenya">
        <option value="Ghana">

    </datalist>

    <datalist id="food">
        
        <option value="Misal">
        <option value ="Pav-Bhaji">
        <option value="Medu-Wada">

    </datalist>

</body>

</html>
